name: Deploy Frontend PROD (promote STAGING artifact)

on:
  workflow_dispatch:
    inputs:
      staging_sha:
        description: "SHA a promover desde STAGING (imagen tag = sha)"
        required: true
      reason:
        description: "Motivo / ticket (texto libre)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-frontend-prod
  cancel-in-progress: false

env:
  REGION: ${{ vars.GCP_REGION_PROD || vars.GCP_REGION || 'europe-west1' }}
  REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: ponti-frontend-registry
  REQUIRE_AUTH_SMOKE: "0"

jobs:
  promote-and-deploy:
    runs-on: ubuntu-latest
    env:
      # STAGING (source image)
      GCP_PROJECT_ID_STG: ${{ vars.GCP_PROJECT_ID_STG }}
      WIF_PROVIDER_STG: ${{ vars.WIF_PROVIDER_STG }}
      WIF_SERVICE_ACCOUNT_STG: ${{ vars.WIF_SERVICE_ACCOUNT_STG }}
      SERVICE_NAME_STG: ${{ vars.CLOUD_RUN_SERVICE_FRONTEND_STG }}

      # PROD (target deploy)
      GCP_PROJECT_ID_PROD: ${{ vars.GCP_PROJECT_ID_PROD }}
      WIF_PROVIDER_PROD: ${{ vars.WIF_PROVIDER_PROD }}
      WIF_SERVICE_ACCOUNT_PROD: ${{ vars.WIF_SERVICE_ACCOUNT_PROD }}
      CLOUD_RUN_SERVICE_ACCOUNT_PROD: ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT_PROD }}
      SERVICE_NAME_PROD: ${{ vars.CLOUD_RUN_SERVICE_FRONTEND_PROD }}

      BACKEND_SERVICE_NAME_PROD: ${{ vars.CLOUD_RUN_SERVICE_BACKEND_PROD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth GCP (STAGING - pull Artifact)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER_STG }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT_STG }}

      - name: Setup gcloud (STAGING)
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID_STG }}

      - name: Configure Docker for Artifact Registry (STAGING)
        run: gcloud auth configure-docker "${{ env.REGISTRY }}" --quiet

      - name: Pull imagen de STAGING
        env:
          STAGING_SHA: ${{ github.event.inputs.staging_sha }}
        run: |
          src_image="${{ env.REGISTRY }}/${GCP_PROJECT_ID_STG}/${{ env.REPOSITORY }}/${SERVICE_NAME_STG}:${STAGING_SHA}"
          echo "SRC_IMAGE=$src_image" >> "$GITHUB_ENV"
          docker pull "$src_image"

      - name: Auth GCP (PROD - push + deploy)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER_PROD }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT_PROD }}

      - name: Setup gcloud (PROD)
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID_PROD }}

      - name: Configure Docker for Artifact Registry (PROD)
        run: gcloud auth configure-docker "${{ env.REGISTRY }}" --quiet

      - name: Push imagen a PROD (retag)
        env:
          STAGING_SHA: ${{ github.event.inputs.staging_sha }}
        run: |
          dst_sha="${{ env.REGISTRY }}/${GCP_PROJECT_ID_PROD}/${{ env.REPOSITORY }}/${SERVICE_NAME_PROD}:${STAGING_SHA}"
          dst_prod="${{ env.REGISTRY }}/${GCP_PROJECT_ID_PROD}/${{ env.REPOSITORY }}/${SERVICE_NAME_PROD}:prod"
          docker tag "$SRC_IMAGE" "$dst_sha"
          docker tag "$SRC_IMAGE" "$dst_prod"
          docker push "$dst_sha"
          docker push "$dst_prod"
          echo "IMAGE=$dst_prod" >> "$GITHUB_ENV"

      - name: Resolve canonical backend API URL (PROD)
        id: backend
        run: |
          backend_service_name="${BACKEND_SERVICE_NAME_PROD:-ponti-backend}"
          backend_url="$(gcloud run services describe "$backend_service_name" \
            --project="${GCP_PROJECT_ID_PROD}" \
            --region="${{ env.REGION }}" \
            --format='value(status.url)')"
          if [[ -z "$backend_url" ]]; then
            echo "ERROR: no se pudo resolver status.url del backend PROD '$backend_service_name'."
            exit 1
          fi
          base_manager_api="${backend_url%/}/api/v1"
          if [[ "$base_manager_api" == *"---"* ]]; then
            echo "ERROR: BASE_MANAGER_API PROD no puede apuntar a URL taggeada: $base_manager_api"
            exit 1
          fi
          echo "BASE_MANAGER_API=$base_manager_api" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run (PROD)
        run: |
          gcloud run deploy "${SERVICE_NAME_PROD}" \
            --project="${GCP_PROJECT_ID_PROD}" \
            --region="${{ env.REGION }}" \
            --image="${IMAGE}" \
            --service-account="${CLOUD_RUN_SERVICE_ACCOUNT_PROD}" \
            --allow-unauthenticated \
            --port=3000 \
            --set-env-vars="NODE_ENV=prod,BASE_MANAGER_API=${{ steps.backend.outputs.BASE_MANAGER_API }},X_API_KEY=${{ secrets.X_API_KEY_PROD || secrets.X_API_KEY }},IDENTITY_PLATFORM_API_KEY=${{ secrets.IDENTITY_PLATFORM_API_KEY_PROD || secrets.IDENTITY_PLATFORM_API_KEY_STG }},IDENTITY_PLATFORM_PROJECT_ID=${GCP_PROJECT_ID_PROD}"

      - name: "Guardrail: verify BASE_MANAGER_API detagged (PROD)"
        run: |
          service_json="$(gcloud run services describe "${SERVICE_NAME_PROD}" \
            --project="${GCP_PROJECT_ID_PROD}" \
            --region="${{ env.REGION }}" \
            --format='json(spec.template.spec.containers[0].env)')"
          deployed_base_manager_api="$(SERVICE_JSON="$service_json" python3 - <<'PY'
          import json, os
          data = json.loads(os.environ["SERVICE_JSON"])
          envs = data.get("spec", {}).get("template", {}).get("spec", {}).get("containers", [{}])[0].get("env", [])
          print(next((e.get("value", "") for e in envs if e.get("name") == "BASE_MANAGER_API"), ""))
          PY
          )"
          if [[ -z "$deployed_base_manager_api" ]]; then
            echo "ERROR: BASE_MANAGER_API vacío en revisión PROD desplegada."
            exit 1
          fi
          if [[ "$deployed_base_manager_api" == *"---"* ]]; then
            echo "ERROR: BASE_MANAGER_API PROD quedó taggeada en deploy: $deployed_base_manager_api"
            exit 1
          fi
          if [[ "$deployed_base_manager_api" != "${{ steps.backend.outputs.BASE_MANAGER_API }}" ]]; then
            echo "ERROR: BASE_MANAGER_API PROD desplegada no coincide con la URL canónica resuelta."
            echo "Esperada: ${{ steps.backend.outputs.BASE_MANAGER_API }}"
            echo "Actual:   $deployed_base_manager_api"
            exit 1
          fi

      - name: Resolve service URL (PROD)
        run: |
          service_url="$(gcloud run services describe "${SERVICE_NAME_PROD}" \
            --project="${GCP_PROJECT_ID_PROD}" \
            --region="${{ env.REGION }}" \
            --format='value(status.url)')"
          if [[ -z "$service_url" ]]; then
            echo "ERROR: no se pudo resolver status.url del servicio frontend PROD."
            exit 1
          fi
          echo "SERVICE_URL=$service_url" >> "$GITHUB_ENV"

      - name: Resolve auth token for functional smoke (PROD)
        run: |
          token="${SMOKE_AUTH_BEARER_TOKEN:-}"
          if [[ -z "$token" ]]; then
            echo "WARN: SMOKE_AUTH_BEARER_TOKEN no configurado; se ejecutará smoke no autenticado."
          else
            echo "::add-mask::$token"
            echo "AUTH_BEARER_TOKEN=$token" >> "$GITHUB_ENV"
          fi
        env:
          SMOKE_AUTH_BEARER_TOKEN: ${{ secrets.SMOKE_AUTH_BEARER_TOKEN_PROD || secrets.SMOKE_AUTH_BEARER_TOKEN }}

      - name: Smoke release checks (PROD)
        run: |
          bash ./scripts/smoke_release.sh "$SERVICE_URL"
        env:
          AUTH_BEARER_TOKEN: ${{ env.AUTH_BEARER_TOKEN }}
          REQUIRE_AUTH_SMOKE: ${{ env.REQUIRE_AUTH_SMOKE }}

