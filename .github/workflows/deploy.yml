name: Deploy Frontend to Cloud Run

on:
  # Deploy automático por rama
  push:
    branches:
      - develop
      - main
  # Deploy manual por rama (siempre a dev)
  workflow_dispatch:
    inputs:
      branch:
        description: "Rama a deployar (siempre a dev)"
        required: true
        type: string
        default: "develop"

env:
  # Variables configurables desde GitHub Actions (Settings → Variables)
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  SERVICE_NAME: ${{ vars.SERVICE_NAME }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}
  ARTIFACT_REGISTRY: ${{ vars.ARTIFACT_REGISTRY }}
  IMAGE_TAG_DEV: ${{ vars.IMAGE_TAG_DEV }}
  IMAGE_TAG_PROD: ${{ vars.IMAGE_TAG_PROD }}
  WIF_PROVIDER: ${{ vars.WIF_PROVIDER }}
  WIF_SERVICE_ACCOUNT: ${{ vars.WIF_SERVICE_ACCOUNT }}
  # Variables sensibles (Settings → Secrets and variables → Actions)
  BASE_LOGIN_API: ${{ secrets.BASE_LOGIN_API }}
  BASE_MANAGER_API: ${{ secrets.BASE_MANAGER_API }}
  X_API_KEY: ${{ secrets.X_API_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      # Checkout con rama seleccionada (o la rama del push)
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}

      # Validación de variables requeridas
      - name: Validate required variables
        run: |
          missing=()
          for var in GCP_PROJECT_ID GCP_REGION SERVICE_NAME IMAGE_NAME ARTIFACT_REGISTRY IMAGE_TAG_DEV IMAGE_TAG_PROD WIF_PROVIDER WIF_SERVICE_ACCOUNT BASE_LOGIN_API BASE_MANAGER_API X_API_KEY; do
            if [[ -z "${!var}" ]]; then
              missing+=("$var")
            fi
          done
          if (( ${#missing[@]} )); then
            echo "Missing required variables: ${missing[*]}"
            exit 1
          fi
        shell: bash

      # Definición del ambiente y tag según rama
      - name: Set deploy environment
        id: vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "DEPLOY_ENV=dev" >> "$GITHUB_OUTPUT"
            echo "IMAGE_TAG=${IMAGE_TAG_DEV}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "DEPLOY_ENV=prod" >> "$GITHUB_OUTPUT"
            echo "IMAGE_TAG=${IMAGE_TAG_PROD}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_name }}" == "develop" ]]; then
            echo "DEPLOY_ENV=dev" >> "$GITHUB_OUTPUT"
            echo "IMAGE_TAG=${IMAGE_TAG_DEV}" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported branch: ${{ github.ref_name }}"
            exit 1
          fi
        shell: bash

      # Autenticación con Workload Identity Federation (sin claves)
      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
          token_format: "access_token"

      # Configuración de gcloud
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      # Login de Docker en Artifact Registry
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${ARTIFACT_REGISTRY}" --quiet
        shell: bash

      # Build del frontend en contenedor (Dockerfile del repo)
      - name: Build Docker image
        run: |
          IMAGE_URI="${ARTIFACT_REGISTRY}/${GCP_PROJECT_ID}/${IMAGE_NAME}"
          docker build -t "${IMAGE_URI}:${{ steps.vars.outputs.IMAGE_TAG }}" .
          docker tag "${IMAGE_URI}:${{ steps.vars.outputs.IMAGE_TAG }}" "${IMAGE_URI}:${GITHUB_SHA}"
        shell: bash

      # Push de la imagen
      - name: Push Docker image
        run: |
          IMAGE_URI="${ARTIFACT_REGISTRY}/${GCP_PROJECT_ID}/${IMAGE_NAME}"
          docker push "${IMAGE_URI}:${{ steps.vars.outputs.IMAGE_TAG }}"
          docker push "${IMAGE_URI}:${GITHUB_SHA}"
        shell: bash

      # Deploy a Cloud Run
      - name: Deploy to Cloud Run
        run: |
          IMAGE_URI="${ARTIFACT_REGISTRY}/${GCP_PROJECT_ID}/${IMAGE_NAME}"
          gcloud run deploy "${SERVICE_NAME}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --image="${IMAGE_URI}:${{ steps.vars.outputs.IMAGE_TAG }}" \
            --allow-unauthenticated \
            --set-env-vars="NODE_ENV=${{ steps.vars.outputs.DEPLOY_ENV }}" \
            --set-env-vars="BASE_LOGIN_API=${BASE_LOGIN_API}" \
            --set-env-vars="BASE_MANAGER_API=${BASE_MANAGER_API}" \
            --set-env-vars="X_API_KEY=${X_API_KEY}"
        shell: bash

      # Confirmación simple de deploy
      - name: Show deployment info
        run: |
          echo "✅ Deploy completado para ${SERVICE_NAME} en ${GCP_REGION}"
        shell: bash
