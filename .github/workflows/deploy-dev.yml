name: Deploy Frontend to Cloud Run

on:
  push:
    branches:
      - develop
      - main

env:
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: ponti-frontend-registry

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment based on branch
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "ENV=staging" >> "$GITHUB_OUTPUT"
            echo "TAG=stg" >> "$GITHUB_OUTPUT"
            echo "SERVICE_NAME=ponti-frontend-staging" >> "$GITHUB_OUTPUT"
            echo "PROJECT_ID=new-ponti-stg" >> "$GITHUB_OUTPUT"
            echo "WIF_PROVIDER=projects/65243764597/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider" >> "$GITHUB_OUTPUT"
            echo "WIF_SERVICE_ACCOUNT=github-actions@new-ponti-stg.iam.gserviceaccount.com" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_name }}" == "develop" ]]; then
            echo "ENV=dev" >> "$GITHUB_OUTPUT"
            echo "TAG=dev" >> "$GITHUB_OUTPUT"
            echo "SERVICE_NAME=ponti-frontend-dev" >> "$GITHUB_OUTPUT"
            echo "PROJECT_ID=new-ponti-dev" >> "$GITHUB_OUTPUT"
            echo "WIF_PROVIDER=projects/1087442197188/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider" >> "$GITHUB_OUTPUT"
            echo "WIF_SERVICE_ACCOUNT=github-actions@new-ponti-dev.iam.gserviceaccount.com" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ steps.env.outputs.WIF_PROVIDER }}
          service_account: ${{ steps.env.outputs.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ steps.env.outputs.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${{ env.REGISTRY }}" --quiet

      - name: Build frontend
        run: |
          corepack enable
          yarn --cwd ui install --frozen-lockfile
          yarn --cwd ui build

      - name: Build Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.env.outputs.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ steps.env.outputs.SERVICE_NAME }}:${{ steps.env.outputs.TAG }}"
          docker build -t "$IMAGE" .
          docker tag "$IMAGE" "${{ env.REGISTRY }}/${{ steps.env.outputs.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ steps.env.outputs.SERVICE_NAME }}:${{ github.sha }}"

      - name: Push Docker image
        run: |
          docker push "${{ env.REGISTRY }}/${{ steps.env.outputs.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ steps.env.outputs.SERVICE_NAME }}:${{ steps.env.outputs.TAG }}"
          docker push "${{ env.REGISTRY }}/${{ steps.env.outputs.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ steps.env.outputs.SERVICE_NAME }}:${{ github.sha }}"

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.env.outputs.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ steps.env.outputs.SERVICE_NAME }}:${{ steps.env.outputs.TAG }}"
          gcloud run deploy "${{ steps.env.outputs.SERVICE_NAME }}" \
            --project="${{ steps.env.outputs.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --image="$IMAGE" \
            --service-account="github-actions@${{ steps.env.outputs.PROJECT_ID }}.iam.gserviceaccount.com" \
            --allow-unauthenticated \
            --port=3000 \
            --set-env-vars="NODE_ENV=${{ steps.env.outputs.ENV }},BASE_LOGIN_API=${{ secrets.BASE_LOGIN_API }},BASE_MANAGER_API=${{ secrets.BASE_MANAGER_API }},X_API_KEY=${{ secrets.X_API_KEY }},IDENTITY_PLATFORM_API_KEY=${{ secrets.IDENTITY_PLATFORM_API_KEY }},IDENTITY_PLATFORM_PROJECT_ID=${{ steps.env.outputs.PROJECT_ID }}"

      - name: Show deployment URL
        run: |
          echo "✅ Deployed service: ${{ steps.env.outputs.SERVICE_NAME }}"
