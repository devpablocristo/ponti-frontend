name: Deploy Frontend to Cloud Run

on:
  push:
    branches:
      - develop
      - main

env:
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: ponti-frontend-registry
  REQUIRE_AUTH_SMOKE: "0"

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment based on branch
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "ENV=staging" >> "$GITHUB_OUTPUT"
            echo "TAG=stg" >> "$GITHUB_OUTPUT"
            echo "SERVICE_NAME=${{ vars.CLOUD_RUN_SERVICE_FRONTEND_STG }}" >> "$GITHUB_OUTPUT"
            echo "PROJECT_ID=${{ vars.GCP_PROJECT_ID_STG }}" >> "$GITHUB_OUTPUT"
            echo "BACKEND_SERVICE_NAME=${{ vars.CLOUD_RUN_SERVICE_BACKEND_STG || 'ponti-backend' }}" >> "$GITHUB_OUTPUT"
            echo "WIF_PROVIDER=${{ vars.WIF_PROVIDER_STG }}" >> "$GITHUB_OUTPUT"
            echo "WIF_SERVICE_ACCOUNT=${{ vars.WIF_SERVICE_ACCOUNT_STG }}" >> "$GITHUB_OUTPUT"
            echo "CLOUD_RUN_SERVICE_ACCOUNT=${{ vars.CLOUD_RUN_SERVICE_ACCOUNT_STG }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_name }}" == "develop" ]]; then
            echo "ENV=dev" >> "$GITHUB_OUTPUT"
            echo "TAG=dev" >> "$GITHUB_OUTPUT"
            echo "SERVICE_NAME=${{ vars.CLOUD_RUN_SERVICE_FRONTEND_DEV }}" >> "$GITHUB_OUTPUT"
            echo "PROJECT_ID=${{ vars.GCP_PROJECT_ID_DEV }}" >> "$GITHUB_OUTPUT"
            echo "BACKEND_SERVICE_NAME=${{ vars.CLOUD_RUN_SERVICE_BACKEND_DEV || 'ponti-backend' }}" >> "$GITHUB_OUTPUT"
            echo "WIF_PROVIDER=${{ vars.WIF_PROVIDER_DEV }}" >> "$GITHUB_OUTPUT"
            echo "WIF_SERVICE_ACCOUNT=${{ vars.WIF_SERVICE_ACCOUNT_DEV }}" >> "$GITHUB_OUTPUT"
            echo "CLOUD_RUN_SERVICE_ACCOUNT=${{ vars.CLOUD_RUN_SERVICE_ACCOUNT_DEV }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ steps.env.outputs.WIF_PROVIDER }}
          service_account: ${{ steps.env.outputs.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ steps.env.outputs.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${{ env.REGISTRY }}" --quiet

      - name: Build frontend
        run: |
          corepack enable
          yarn --cwd ui install --frozen-lockfile
          yarn --cwd ui build

      - name: Build Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.env.outputs.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ steps.env.outputs.SERVICE_NAME }}:${{ steps.env.outputs.TAG }}"
          docker build -t "$IMAGE" .
          docker tag "$IMAGE" "${{ env.REGISTRY }}/${{ steps.env.outputs.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ steps.env.outputs.SERVICE_NAME }}:${{ github.sha }}"

      - name: Resolve canonical backend API URL
        id: backend
        run: |
          backend_url="$(gcloud run services describe "${{ steps.env.outputs.BACKEND_SERVICE_NAME }}" \
            --project="${{ steps.env.outputs.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --format='value(status.url)')"
          if [[ -z "$backend_url" ]]; then
            echo "ERROR: no se pudo resolver status.url del backend '${{ steps.env.outputs.BACKEND_SERVICE_NAME }}'."
            exit 1
          fi
          base_manager_api="${backend_url%/}/api/v1"
          if [[ "$base_manager_api" == *"---"* ]]; then
            echo "ERROR: BASE_MANAGER_API no puede apuntar a URL taggeada: $base_manager_api"
            exit 1
          fi
          echo "BASE_MANAGER_API=$base_manager_api" >> "$GITHUB_OUTPUT"

      - name: Push Docker image
        run: |
          docker push "${{ env.REGISTRY }}/${{ steps.env.outputs.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ steps.env.outputs.SERVICE_NAME }}:${{ steps.env.outputs.TAG }}"
          docker push "${{ env.REGISTRY }}/${{ steps.env.outputs.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ steps.env.outputs.SERVICE_NAME }}:${{ github.sha }}"

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.env.outputs.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ steps.env.outputs.SERVICE_NAME }}:${{ steps.env.outputs.TAG }}"
          gcloud run deploy "${{ steps.env.outputs.SERVICE_NAME }}" \
            --project="${{ steps.env.outputs.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --image="$IMAGE" \
            --service-account="${{ steps.env.outputs.CLOUD_RUN_SERVICE_ACCOUNT }}" \
            --allow-unauthenticated \
            --port=3000 \
            --set-env-vars="NODE_ENV=${{ steps.env.outputs.ENV }},BASE_MANAGER_API=${{ steps.backend.outputs.BASE_MANAGER_API }},X_API_KEY=${{ secrets.X_API_KEY }},IDENTITY_PLATFORM_API_KEY=${{ github.ref_name == 'main' && secrets.IDENTITY_PLATFORM_API_KEY_STG || secrets.IDENTITY_PLATFORM_API_KEY_DEV }},IDENTITY_PLATFORM_PROJECT_ID=${{ steps.env.outputs.PROJECT_ID }}"

      - name: "Guardrail: verify BASE_MANAGER_API detagged in deployed revision"
        run: |
          deployed_base_manager_api="$(gcloud run services describe "${{ steps.env.outputs.SERVICE_NAME }}" \
            --project="${{ steps.env.outputs.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --format='value(spec.template.spec.containers[0].env[?name=BASE_MANAGER_API].value)')"
          if [[ -z "$deployed_base_manager_api" ]]; then
            echo "ERROR: BASE_MANAGER_API vacío en revisión desplegada."
            exit 1
          fi
          if [[ "$deployed_base_manager_api" == *"---"* ]]; then
            echo "ERROR: BASE_MANAGER_API quedó taggeada en deploy: $deployed_base_manager_api"
            exit 1
          fi
          if [[ "$deployed_base_manager_api" != "${{ steps.backend.outputs.BASE_MANAGER_API }}" ]]; then
            echo "ERROR: BASE_MANAGER_API desplegada no coincide con la URL canónica resuelta."
            echo "Esperada: ${{ steps.backend.outputs.BASE_MANAGER_API }}"
            echo "Actual:   $deployed_base_manager_api"
            exit 1
          fi

      - name: Resolve service URL
        run: |
          service_url="$(gcloud run services describe "${{ steps.env.outputs.SERVICE_NAME }}" \
            --project="${{ steps.env.outputs.PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --format='value(status.url)')"
          if [[ -z "$service_url" ]]; then
            echo "ERROR: no se pudo resolver status.url del servicio frontend."
            exit 1
          fi
          echo "SERVICE_URL=$service_url" >> "$GITHUB_ENV"

      - name: Resolve auth token for functional smoke
        run: |
          token="${SMOKE_AUTH_BEARER_TOKEN:-}"
          if [[ -z "$token" ]]; then
            echo "WARN: SMOKE_AUTH_BEARER_TOKEN no configurado; se ejecutará smoke no autenticado."
          else
            echo "::add-mask::$token"
            echo "AUTH_BEARER_TOKEN=$token" >> "$GITHUB_ENV"
          fi
        env:
          SMOKE_AUTH_BEARER_TOKEN: ${{ github.ref_name == 'main' && (secrets.SMOKE_AUTH_BEARER_TOKEN_STG || secrets.SMOKE_AUTH_BEARER_TOKEN) || (secrets.SMOKE_AUTH_BEARER_TOKEN_DEV || secrets.SMOKE_AUTH_BEARER_TOKEN) }}

      - name: Smoke release checks
        run: |
          bash ./scripts/smoke_release.sh "$SERVICE_URL"
        env:
          AUTH_BEARER_TOKEN: ${{ env.AUTH_BEARER_TOKEN }}
          REQUIRE_AUTH_SMOKE: ${{ env.REQUIRE_AUTH_SMOKE }}

      - name: Show deployment URL
        run: |
          echo "✅ Deployed service: ${{ steps.env.outputs.SERVICE_NAME }}"
