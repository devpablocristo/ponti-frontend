name: CI PR Frontend

on:
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: ponti-frontend-ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: ui/yarn.lock

      - name: Enable corepack
        run: corepack enable

      - name: Install UI dependencies
        run: yarn --cwd ui install --frozen-lockfile

      - name: Lint UI
        run: yarn --cwd ui lint

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: ui/yarn.lock

      - name: Enable corepack
        run: corepack enable

      - name: Install UI dependencies
        run: yarn --cwd ui install --frozen-lockfile

      - name: Build UI
        run: yarn --cwd ui build
