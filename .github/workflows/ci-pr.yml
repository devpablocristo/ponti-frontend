name: CI PR Frontend

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout core
        uses: actions/checkout@v4
        with:
          repository: devpablocristo/core
          token: ${{ secrets.CORE_REPO_READ_TOKEN }}
          path: core-repo

      - name: Checkout modules
        uses: actions/checkout@v4
        with:
          repository: devpablocristo/modules
          path: modules-repo

      - name: Link shared repos for file dependencies
        run: |
          EXPECTED_CORE_PATH="$(cd "$GITHUB_WORKSPACE/../.." && pwd)/core"
          EXPECTED_MODULES_PATH="$(cd "$GITHUB_WORKSPACE/../.." && pwd)/modules"
          mkdir -p "$(dirname "$EXPECTED_CORE_PATH")"
          rm -rf "$EXPECTED_CORE_PATH" "$EXPECTED_MODULES_PATH"
          ln -s "$GITHUB_WORKSPACE/core-repo" "$EXPECTED_CORE_PATH"
          ln -s "$GITHUB_WORKSPACE/modules-repo" "$EXPECTED_MODULES_PATH"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: ui/yarn.lock

      - name: Enable corepack
        run: corepack enable

      - name: Install UI dependencies
        run: yarn --cwd ui install --frozen-lockfile

      - name: Link workspace node_modules for shared packages
        run: |
          EXPECTED_SHARED_NODE_MODULES="$(cd "$GITHUB_WORKSPACE/../.." && pwd)/node_modules"
          rm -rf "$EXPECTED_SHARED_NODE_MODULES"
          ln -s "$GITHUB_WORKSPACE/ui/node_modules" "$EXPECTED_SHARED_NODE_MODULES"

      - name: Lint UI
        run: yarn --cwd ui lint

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout core
        uses: actions/checkout@v4
        with:
          repository: devpablocristo/core
          token: ${{ secrets.CORE_REPO_READ_TOKEN }}
          path: core-repo

      - name: Checkout modules
        uses: actions/checkout@v4
        with:
          repository: devpablocristo/modules
          path: modules-repo

      - name: Link shared repos for file dependencies
        run: |
          EXPECTED_CORE_PATH="$(cd "$GITHUB_WORKSPACE/../.." && pwd)/core"
          EXPECTED_MODULES_PATH="$(cd "$GITHUB_WORKSPACE/../.." && pwd)/modules"
          mkdir -p "$(dirname "$EXPECTED_CORE_PATH")"
          rm -rf "$EXPECTED_CORE_PATH" "$EXPECTED_MODULES_PATH"
          ln -s "$GITHUB_WORKSPACE/core-repo" "$EXPECTED_CORE_PATH"
          ln -s "$GITHUB_WORKSPACE/modules-repo" "$EXPECTED_MODULES_PATH"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: ui/yarn.lock

      - name: Enable corepack
        run: corepack enable

      - name: Install UI dependencies
        run: yarn --cwd ui install --frozen-lockfile

      - name: Link workspace node_modules for shared packages
        run: |
          EXPECTED_SHARED_NODE_MODULES="$(cd "$GITHUB_WORKSPACE/../.." && pwd)/node_modules"
          rm -rf "$EXPECTED_SHARED_NODE_MODULES"
          ln -s "$GITHUB_WORKSPACE/ui/node_modules" "$EXPECTED_SHARED_NODE_MODULES"

      - name: Build UI
        run: yarn --cwd ui build
