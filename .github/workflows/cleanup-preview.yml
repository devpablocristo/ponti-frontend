name: Cleanup Frontend Preview Resources

on:
  schedule:
    # TTL check cada 6 horas
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  WIF_PROVIDER: ${{ vars.WIF_PROVIDER }}
  WIF_SERVICE_ACCOUNT: ${{ vars.WIF_SERVICE_ACCOUNT }}
  PREVIEW_SERVICE_PREFIX: ${{ vars.PREVIEW_SERVICE_PREFIX }}
  PREVIEW_TTL_HOURS: ${{ vars.PREVIEW_TTL_HOURS }}
  SERVICE_NAME: ${{ vars.SERVICE_NAME }}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Validar config mínima
        run: |
          if [ -z "$GCP_PROJECT_ID" ]; then
            echo "::error::Falta vars.GCP_PROJECT_ID"
            exit 1
          fi
          if [ -z "$GCP_REGION" ]; then
            echo "::error::Falta vars.GCP_REGION"
            exit 1
          fi

          # Si no hay prefijo, derivar desde SERVICE_NAME
          if [ -z "$PREVIEW_SERVICE_PREFIX" ]; then
            PREVIEW_SERVICE_PREFIX="${SERVICE_NAME}-preview-"
            echo "PREVIEW_SERVICE_PREFIX=$PREVIEW_SERVICE_PREFIX" >> "$GITHUB_ENV"
          fi

          # TTL por defecto 48h si no está configurado
          if [ -z "$PREVIEW_TTL_HOURS" ]; then
            PREVIEW_TTL_HOURS="48"
            echo "PREVIEW_TTL_HOURS=$PREVIEW_TTL_HOURS" >> "$GITHUB_ENV"
          fi
        shell: bash

      - name: Cleanup TTL (elimina previews > TTL)
        run: |
          echo "::notice::Limpiando frontend previews con TTL > ${PREVIEW_TTL_HOURS}h"
          CUTOFF=$(date -u -d "${PREVIEW_TTL_HOURS} hours ago" +%Y-%m-%dT%H:%M:%SZ)

          echo "::notice::Buscando servicios preview expirados..."
          gcloud run services list \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --format=json | \
          jq -r --arg prefix "$PREVIEW_SERVICE_PREFIX" --arg cutoff "$CUTOFF" '
            .[] | select(.metadata.name | startswith($prefix)) |
            select(.metadata.creationTimestamp < $cutoff) |
            .metadata.name
          ' | while read -r name; do
            [ -z "$name" ] && continue
            echo "::notice::Eliminando servicio expirado: $name"
            gcloud run services delete "$name" \
              --project="$GCP_PROJECT_ID" \
              --region="$GCP_REGION" \
              --quiet || true
          done

          echo "::notice::Cleanup TTL completado"
        shell: bash

