name: Deploy Frontend STAGING (Cloud Run)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: "Rama o ref a desplegar (default: main)"
        required: false
        default: "main"

concurrency:
  group: ponti-frontend-deploy-staging-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: true

env:
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: ponti-frontend-registry
  REQUIRE_AUTH_SMOKE: "0"

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER_STG }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT_STG }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID_STG }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${{ env.REGISTRY }}" --quiet

      - name: Build frontend
        run: |
          corepack enable
          yarn --cwd ui install --frozen-lockfile
          yarn --cwd ui build

      - name: Build Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ vars.GCP_PROJECT_ID_STG }}/${{ env.REPOSITORY }}/${{ vars.CLOUD_RUN_SERVICE_FRONTEND_STG }}:stg"
          docker build -t "$IMAGE" .
          docker tag "$IMAGE" "${{ env.REGISTRY }}/${{ vars.GCP_PROJECT_ID_STG }}/${{ env.REPOSITORY }}/${{ vars.CLOUD_RUN_SERVICE_FRONTEND_STG }}:${{ github.sha }}"

      - name: Resolve canonical backend API URL (STAGING)
        id: backend
        run: |
          backend_service_name="${{ vars.CLOUD_RUN_SERVICE_BACKEND_STG || 'ponti-backend' }}"
          backend_url="$(gcloud run services describe "$backend_service_name" \
            --project="${{ vars.GCP_PROJECT_ID_STG }}" \
            --region="${{ env.REGION }}" \
            --format='value(status.url)')"
          if [[ -z "$backend_url" ]]; then
            echo "ERROR: no se pudo resolver status.url del backend STAGING '$backend_service_name'."
            exit 1
          fi
          base_manager_api="${backend_url%/}/api/v1"
          if [[ "$base_manager_api" == *"---"* ]]; then
            echo "ERROR: BASE_MANAGER_API STAGING no puede apuntar a URL taggeada: $base_manager_api"
            exit 1
          fi
          echo "BASE_MANAGER_API=$base_manager_api" >> "$GITHUB_OUTPUT"

      - name: Push Docker image
        run: |
          docker push "${{ env.REGISTRY }}/${{ vars.GCP_PROJECT_ID_STG }}/${{ env.REPOSITORY }}/${{ vars.CLOUD_RUN_SERVICE_FRONTEND_STG }}:stg"
          docker push "${{ env.REGISTRY }}/${{ vars.GCP_PROJECT_ID_STG }}/${{ env.REPOSITORY }}/${{ vars.CLOUD_RUN_SERVICE_FRONTEND_STG }}:${{ github.sha }}"

      - name: Deploy to Cloud Run (STAGING)
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ vars.GCP_PROJECT_ID_STG }}/${{ env.REPOSITORY }}/${{ vars.CLOUD_RUN_SERVICE_FRONTEND_STG }}:stg"
          gcloud run deploy "${{ vars.CLOUD_RUN_SERVICE_FRONTEND_STG }}" \
            --project="${{ vars.GCP_PROJECT_ID_STG }}" \
            --region="${{ env.REGION }}" \
            --image="$IMAGE" \
            --service-account="${{ vars.CLOUD_RUN_SERVICE_ACCOUNT_STG }}" \
            --allow-unauthenticated \
            --port=3000 \
            --set-env-vars="NODE_ENV=staging,BASE_MANAGER_API=${{ steps.backend.outputs.BASE_MANAGER_API }},X_API_KEY=${{ secrets.X_API_KEY }},IDENTITY_PLATFORM_API_KEY=${{ secrets.IDENTITY_PLATFORM_API_KEY_STG }},IDENTITY_PLATFORM_PROJECT_ID=${{ vars.GCP_PROJECT_ID_STG }}"

      - name: "Guardrail: verify BASE_MANAGER_API detagged (STAGING)"
        run: |
          service_json="$(gcloud run services describe "${{ vars.CLOUD_RUN_SERVICE_FRONTEND_STG }}" \
            --project="${{ vars.GCP_PROJECT_ID_STG }}" \
            --region="${{ env.REGION }}" \
            --format='json(spec.template.spec.containers[0].env)')"
          deployed_base_manager_api="$(SERVICE_JSON="$service_json" python3 - <<'PY'
          import json, os
          data = json.loads(os.environ["SERVICE_JSON"])
          envs = data.get("spec", {}).get("template", {}).get("spec", {}).get("containers", [{}])[0].get("env", [])
          print(next((e.get("value", "") for e in envs if e.get("name") == "BASE_MANAGER_API"), ""))
          PY
          )"
          if [[ -z "$deployed_base_manager_api" ]]; then
            echo "ERROR: BASE_MANAGER_API vacío en revisión STAGING desplegada."
            exit 1
          fi
          if [[ "$deployed_base_manager_api" == *"---"* ]]; then
            echo "ERROR: BASE_MANAGER_API STAGING quedó taggeada en deploy: $deployed_base_manager_api"
            exit 1
          fi
          if [[ "$deployed_base_manager_api" != "${{ steps.backend.outputs.BASE_MANAGER_API }}" ]]; then
            echo "ERROR: BASE_MANAGER_API STAGING desplegada no coincide con la URL canónica resuelta."
            echo "Esperada: ${{ steps.backend.outputs.BASE_MANAGER_API }}"
            echo "Actual:   $deployed_base_manager_api"
            exit 1
          fi

      - name: Resolve service URL (STAGING)
        run: |
          service_url="$(gcloud run services describe "${{ vars.CLOUD_RUN_SERVICE_FRONTEND_STG }}" \
            --project="${{ vars.GCP_PROJECT_ID_STG }}" \
            --region="${{ env.REGION }}" \
            --format='value(status.url)')"
          if [[ -z "$service_url" ]]; then
            echo "ERROR: no se pudo resolver status.url del servicio frontend STAGING."
            exit 1
          fi
          echo "SERVICE_URL=$service_url" >> "$GITHUB_ENV"

      - name: Resolve auth token for functional smoke (STAGING)
        run: |
          token="${SMOKE_AUTH_BEARER_TOKEN:-}"
          if [[ -z "$token" ]]; then
            echo "WARN: SMOKE_AUTH_BEARER_TOKEN no configurado; se ejecutará smoke no autenticado."
          else
            echo "::add-mask::$token"
            echo "AUTH_BEARER_TOKEN=$token" >> "$GITHUB_ENV"
          fi
        env:
          SMOKE_AUTH_BEARER_TOKEN: ${{ secrets.SMOKE_AUTH_BEARER_TOKEN_STG }}

      - name: Smoke release checks (STAGING)
        run: |
          bash ./scripts/smoke_release.sh "$SERVICE_URL"
        env:
          AUTH_BEARER_TOKEN: ${{ env.AUTH_BEARER_TOKEN }}
          REQUIRE_AUTH_SMOKE: ${{ env.REQUIRE_AUTH_SMOKE }}
