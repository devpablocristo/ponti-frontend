services:
  ponti-ui:
    image: node:20.17.0
    working_dir: /app
    command: sh -c "if [ ! -f node_modules/.yarn-integrity ]; then yarn install --frozen-lockfile --network-timeout 600000 --network-concurrency 1; fi && yarn dev --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./ui:/app
      - ui_node_modules:/app/node_modules
      - yarn_cache:/yarn-cache
    # Vite lee `./ui/.env` (montado). Evitar hardcodear infra acá.
    environment:
      # En Docker, "localhost" desde la UI apunta al contenedor. Usar el host para llegar al BFF
      # que corre en network_mode: host.
      - BFF_URL=http://host.docker.internal:3000
      - YARN_CACHE_FOLDER=/yarn-cache
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - ponti-bff
    networks:
      - fe-network
    restart: unless-stopped

  ponti-bff:
    image: node:20.17.0
    working_dir: /app
    command: sh -c "if [ ! -f node_modules/.yarn-integrity ]; then yarn install --frozen-lockfile --network-timeout 600000 --network-concurrency 1; fi && yarn dev"
    network_mode: host
    volumes:
      - ./api:/app
      - bff_node_modules:/app/node_modules
      - yarn_cache:/yarn-cache
    env_file:
      - ./api/.env
    environment:
      - NODE_ENV=development
      - YARN_CACHE_FOLDER=/yarn-cache
      # ENABLE_MOCKS=1 solo para testing sin backend. NUNCA activar en local con stack real.
      # - ENABLE_MOCKS=1
    restart: unless-stopped

networks:
  fe-network:
    driver: bridge

volumes:
  ui_node_modules:
  bff_node_modules:
  yarn_cache:
