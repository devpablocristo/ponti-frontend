services:
  ponti-ui:
    image: node:20.17.0
    working_dir: /app
    command: sh -c "yarn install --frozen-lockfile && yarn dev --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./ui:/app
      - ui_node_modules:/app/node_modules
    environment:
      - VITE_API_BASE_URL=/api
    depends_on:
      - ponti-bff
    networks:
      - fe-network
    restart: unless-stopped

  ponti-bff:
    image: node:20.17.0
    working_dir: /app
    command: sh -c "yarn install --frozen-lockfile && yarn dev"
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app
      - bff_node_modules:/app/node_modules
    env_file:
      - ./api/.env
    environment:
      - NODE_ENV=development
      - PORT=3000
    networks:
      - fe-network
    restart: unless-stopped

networks:
  fe-network:
    driver: bridge

volumes:
  ui_node_modules:
  bff_node_modules:
